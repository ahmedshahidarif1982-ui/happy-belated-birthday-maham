
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maham's Belated Birthday Adventure</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#061a40,#7a1238);color:white;overflow:hidden;min-height:100vh;display:flex;justify-content:center;align-items:center;padding-bottom:130px}
.card{width:min(88%,820px);padding:40px;border-radius:32px;background:rgba(255,255,255,.12);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.25);text-align:center;animation:float 4s ease-in-out infinite;box-shadow:0 20px 50px rgba(0,0,0,.45);margin-bottom:40px;z-index:2}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
#emoji{font-size:90px} button{padding:18px 36px;font-size:22px;border:none;border-radius:18px;cursor:pointer;background:linear-gradient(45deg,#ff5d8f,#ffb36b);color:white;font-weight:bold;box-shadow:0 0 25px rgba(255,120,170,.6)}
#bag{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,.85);padding:15px;z-index:5}
#items{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:10px}
.item{padding:10px 15px;border-radius:20px;background:#0a2249;animation:pop .45s ease}
@keyframes pop{0%{transform:scale(0) rotate(-20deg)}100%{transform:scale(1) rotate(0)}}
.particle{position:fixed;top:-30px;pointer-events:none;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
#restart{display:none;margin-top:20px}
</style></head><body>
<div class="card">
<h1 id="title">🎉 Maham's Belated Birthday Adventure 🎉</h1>
<div id="emoji">🎮</div>
<p id="text">Press play to begin the adventure.</p>
<button id="btn" onclick="nextScene()">▶ Start Adventure</button><br>
<button id="restart" onclick="restartAdventure()">🔄 Restart Adventure</button>
</div>
<div id="bag"><b>🎒 Backpack</b><div id="items"></div></div>
<script>
const scenes=[
["✈️","The adventure begins under the night sky as we rush to grab the tickets to Lahore. The birthday mission has officially started.","🎟️ Lahore Tickets","🎟️ Get Tickets to Lahore"],
["🐶","No journey can begin without the VIP passenger. Waiting patiently is Ice — the fluffy white guardian of the trip and official treat inspector.","🐶 Ice","🐶 Pick Up Ice"],
["🍰","The scent of fresh cake fills the air as another piece of the celebration falls into place.","🍰 Cake","🍰 Get Cake"],
["🥤","A celebration without a chocolate shake simply wasn't an option. One sip later and the adventure feels even sweeter.","🥤 Choco Shake","🥤 Grab Choco Shake"],
["🍦","Under the glowing McDonald's sign, the legendary birthday ice cream is secured. Mission status: deliciously successful.","🍦 Ice Cream","🍦 Claim Ice Cream"],
["🎂","The room grows quiet. Maham stands before the cake while Ice watches closely nearby. A wish is made...","", "🎂 Blow Out Candles"]
];
let step=-1;
function particles(n){for(let i=0;i<n;i++){let p=document.createElement('div');p.className='particle';p.innerHTML=Math.random()>.5?'🎉':'❤️';p.style.left=Math.random()*100+'vw';p.style.fontSize=(18+Math.random()*22)+'px';p.style.animationDuration=(3+Math.random()*4)+'s';document.body.appendChild(p);setTimeout(()=>p.remove(),7000);}}
setInterval(()=>particles(2),1000);
function nextScene(){
if(step>=0 && scenes[step][2]){let d=document.createElement('div');d.className='item';d.textContent=scenes[step][2];items.appendChild(d);}
step++;
if(step<scenes.length){emoji.textContent=scenes[step][0];text.textContent=scenes[step][1];btn.textContent=scenes[step][3];}
else{title.textContent='🎉 HAPPY BELATED BIRTHDAY MAHAM 🎉';emoji.textContent='🎆';text.innerHTML='From rushing for Lahore tickets to travelling with Ice, collecting treats, and sharing cake under falling confetti — this little adventure was built just for you.<br><br>May your year be full of laughter, memories, adventures and of course plenty of snacks for Ice. ❤️';btn.style.display='none';restart.style.display='inline-block';particles(150);}
}
function restartAdventure(){step=-1;items.innerHTML='';title.textContent="🎉 Maham's Belated Birthday Adventure 🎉";emoji.textContent='🎮';text.textContent='Press play to begin the adventure.';btn.style.display='inline-block';btn.textContent='▶ Start Adventure';restart.style.display='none';}
</script></body></html>
